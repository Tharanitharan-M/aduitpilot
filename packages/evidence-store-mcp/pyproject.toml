[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "evidence-store-mcp"
version = "0.1.0"
description = "MCP server for AuditPilot evidence store — semantic search over collected compliance evidence rows. Apache-2.0."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Tharanitharan M", email = "tharanimtharan@gmail.com" }]
requires-python = ">=3.11"
keywords = ["mcp", "model-context-protocol", "auditpilot", "compliance", "soc2", "evidence", "pgvector"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Intended Audience :: Developers",
]
dependencies = [
    "mcp>=1.0",
    "pydantic>=2.0",
    "psycopg[binary,pool]>=3.1",
    "httpx>=0.27",
    "opentelemetry-api>=1.24",
    "opentelemetry-sdk>=1.24",
    "pgvector>=0.4.2",
]

[project.urls]
Homepage = "https://github.com/Tharanitharan-M/auditpilot"
Repository = "https://github.com/Tharanitharan-M/evidence-store-mcp"
Issues = "https://github.com/Tharanitharan-M/auditpilot/issues"
Changelog = "https://github.com/Tharanitharan-M/auditpilot/blob/main/packages/evidence-store-mcp/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
evidence-store-mcp = "evidence_store_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/evidence_store_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN", "BLE001"]
# ANN101 / ANN102 were removed from ruff (self/cls now inferred).
ignore = []

[tool.mypy]
python_version = "3.11"
strict = true
